syntax = "proto3";

package user;

option go_package = "proto/user";

service UserService {
    // 用户注册
    rpc Register(RegisterRequest) returns (RegisterResponse);
    // 用户登录
    rpc Login(LoginRequest) returns (LoginResponse);
    // 用户退出
    rpc Logout(LogoutRequest) returns (LogoutResponse);
    // 获取用户列表
    rpc GetUserList(GetUserListRequest) returns (GetUserListResponse);
}

message RegisterRequest {
    string username = 1;
    string password = 2;
    string email = 3;
    string phone = 4;
}

message RegisterResponse {
    bool success = 1;
    string message = 2;
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    string token = 1;
    string message = 2;
}

message LogoutRequest {
    string token = 1;
}

message LogoutResponse {
    bool success = 1;
    string message = 2;
}

message GetUserListRequest {
    int32 page = 1;
    int32 page_size = 2;
}

message GetUserListResponse {
    repeated User users = 1;
    int64 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message User {
    uint64 id = 1;
    string username = 2;
    string email = 3;
    string phone = 4;
    int32 status = 5;
    int64 created_at = 6;
    int64 updated_at = 7;
}
